<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ออฟไลน์ | ระบบคลังสินค้า Pioneer</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .box { max-width: 360px; }
      .icon { font-size: 3.5rem; margin-bottom: 1rem; }
      h1 { font-size: 1.4rem; margin: 0 0 0.5rem; }
      p { color: #cbd5e1; line-height: 1.6; margin: 0 0 1.5rem; }
      button {
        background: #dc2626;
        color: #fff;
        border: none;
        padding: 0.8rem 1.6rem;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="icon">📡</div>
      <h1>ออฟไลน์อยู่</h1>
      <p>
        ไม่สามารถเชื่อมต่ออินเทอร์เน็ตได้ในขณะนี้ —
        ระบบคลังต้องใช้การเชื่อมต่อเพื่ออ่าน/บันทึกข้อมูล
        โปรดตรวจสอบสัญญาณแล้วลองอีกครั้ง
      </p>
      <button onclick="location.reload()">ลองใหม่อีกครั้ง</button>
    </div>
  </body>
</html>
